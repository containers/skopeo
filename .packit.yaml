---
# See the documentation for more information:
# https://packit.dev/docs/configuration/

# NOTE: The Packit copr_build tasks help to check if every commit builds on
# supported Fedora and CentOS Stream arches.
# They do not block the current Cirrus-based workflow.

downstream_package_name: skopeo
upstream_tag_template: v{version}

packages:
  skopeo-fedora:
    pkg_tool: fedpkg
    specfile_path: rpm/skopeo.spec
  skopeo-centos:
    pkg_tool: centpkg
    specfile_path: rpm/skopeo.spec
  skopeo-rhel:
    specfile_path: rpm/skopeo.spec

srpm_build_deps:
  - make

jobs:
  - job: copr_build
    trigger: pull_request
    packages: [skopeo-fedora]
    notifications: &copr_build_failure_notification
      failure_comment:
        message: "Ephemeral COPR build failed. @containers/packit-build please check."
    targets:
      fedora-all-x86_64: {}
      fedora-all-aarch64: {}
      fedora-eln-x86_64:
        additional_repos:
          - "https://kojipkgs.fedoraproject.org/repos/eln-build/latest/x86_64/"
      fedora-eln-aarch64:
        additional_repos:
          - "https://kojipkgs.fedoraproject.org/repos/eln-build/latest/aarch64/"
    enable_net: true

  - job: copr_build
    trigger: pull_request
    packages: [skopeo-centos]
    notifications: *copr_build_failure_notification
    targets: &centos_targets
      - centos-stream-9-x86_64
      - centos-stream-9-aarch64
      - centos-stream-10-x86_64
      - centos-stream-10-aarch64
    enable_net: true

  - job: copr_build
    trigger: pull_request
    packages: [skopeo-rhel]
    notifications: *copr_build_failure_notification
    targets:
      - epel-9-x86_64
      - epel-9-aarch64
    enable_net: true

  # Run on commit to main branch
  - job: copr_build
    trigger: commit
    packages: [skopeo-fedora]
    notifications:
      failure_comment:
        message: "podman-next COPR build failed. @containers/packit-build please check."
    branch: main
    owner: rhcontainerbot
    project: podman-next
    enable_net: true

  # Tests on Fedora
  - job: tests
    trigger: pull_request
    packages: [skopeo-fedora]
      #notifications:
      #failure_comment:
      #  message: "skopeo system tests failed on RHEL. @containers/packit-build please check."
    targets:
      - fedora-all-x86_64
      - fedora-all-aarch64
    tf_extra_params:
      environments:
        - artifacts:
          - type: repository-file
            id: https://copr.fedorainfracloud.org/coprs/rhcontainerbot/podman-next/repo/fedora-$releasever/rhcontainerbot-podman-next-fedora-$releasever.repo

  # Tests on CentOS Stream
  - job: tests
    trigger: pull_request
    packages: [skopeo-centos]
      #notifications:
      #failure_comment:
      #  message: "skopeo system tests failed on RHEL. @containers/packit-build please check."
    targets: *centos_targets
    tf_extra_params:
      environments:
        - artifacts:
          - type: repository-file
            id: https://copr.fedorainfracloud.org/coprs/rhcontainerbot/podman-next/repo/centos-stream-$releasever/rhcontainerbot-podman-next-centos-stream-$releasever.repo

  # System tests on RHEL
  - job: tests
    trigger: pull_request
    packages: [skopeo-rhel]
    use_internal_tf: true
      #notifications:
      #failure_comment:
      #  message: "skopeo system tests failed on RHEL. @containers/packit-build please check."
    targets:
      epel-9-aarch64:
        distros: [RHEL-9-Nightly,RHEL-9.4.0-Nightly]
      epel-9-x86_64:
        distros: [RHEL-9-Nightly,RHEL-9.4.0-Nightly]
    tf_extra_params:
      environments:
        - artifacts:
          - type: repository-file
            id: https://copr.fedorainfracloud.org/coprs/rhcontainerbot/podman-next/repo/epel-$releasever/rhcontainerbot-podman-next-epel-$releasever.repo
          - type: repository-file
            id: https://src.fedoraproject.org/rpms/epel-release/raw/epel9/f/epel.repo

  # Sync to Fedora
  - job: propose_downstream
    trigger: release
    packages: [skopeo-fedora]
    update_release: false
    dist_git_branches:
      - fedora-all

  # Sync to CentOS Stream
  - job: propose_downstream
    trigger: release
    packages: [skopeo-centos]
    update_release: false
    dist_git_branches:
      - c10s

  - job: koji_build
    trigger: commit
    dist_git_branches:
      - fedora-all

  - job: bodhi_update
    trigger: commit
    dist_git_branches:
      - fedora-branched # rawhide updates are created automatically
