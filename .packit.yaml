---
# See the documentation for more information:
# https://packit.dev/docs/configuration/

downstream_package_name: skopeo
upstream_tag_template: v{version}

specfile_path: rpm/skopeo.spec

# Disable automatic merging for Copr builds (and subsequent Testing Farm)
merge_pr_in_ci: false

jobs:
  - job: copr_build
    trigger: pull_request
    notifications:
      failure_comment:
        message: "Packit jobs failed. @containers/packit-build please check."
    targets:
      - epel-9-x86_64
      - epel-9-aarch64
      - epel-10-x86_64
      - epel-10-aarch64
    enable_net: true

  # Tests on RHEL 9 and RHEL 10 using internal Testing Farm ranch
  - job: tests
    trigger: pull_request
    use_internal_tf: true
    targets:
      epel-9-x86_64:
        distros: [RHEL-9.6.0-Nightly]
      epel-9-aarch64:
        distros: [RHEL-9.6.0-Nightly]
      epel-10-x86_64:
        distros: [RHEL-10.0-Nightly]
      epel-10-aarch64:
        distros: [RHEL-10.0-Nightly]
