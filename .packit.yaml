---
# See the documentation for more information:
# https://packit.dev/docs/configuration/

# NOTE: The Packit copr_build tasks help to check if every commit builds on
# supported Fedora and CentOS Stream arches.
# They do not block the current Cirrus-based workflow.

specfile_path: rpm/skopeo.spec
upstream_tag_template: v{version}

srpm_build_deps:
  - make

jobs:
  - job: copr_build
    trigger: pull_request
      #notifications:
      #failure_comment:
      #  message: "Ephemeral COPR build failed. @containers/packit-build please check."
    enable_net: true
    targets:
      - fedora-all-x86_64
      - fedora-all-aarch64
      - fedora-eln-x86_64
      - fedora-eln-aarch64
      - epel-8-x86_64
      - epel-8-aarch64
      - epel-9-x86_64
      - epel-9-aarch64
    additional_repos:
      - "copr://rhcontainerbot/podman-next"

  # Run on commit to main branch
  - job: copr_build
    trigger: commit
    notifications:
      failure_comment:
        message: "podman-next COPR build failed. @containers/packit-build please check."
    branch: main
    owner: rhcontainerbot
    project: podman-next
    enable_net: true

  # Validate test
  - job: tests
    trigger: pull_request
    skip_build: true
    targets: &test_target
      # Only need to test on one environment
      - fedora-latest-stable-x86_64
    identifier: validate_test
    tmt_plan: "/plans/validate_test"

  # Unit test
  - job: tests
    trigger: pull_request
    skip_build: true
    targets: *test_target
    identifier: unit_test
    tmt_plan: "/plans/unit_test"

  # Integration test
  - job: tests
    trigger: pull_request
    skip_build: true
    targets: *test_target
    identifier: integration_test
    tmt_plan: "/plans/integration_test"

  # System tests
  - job: tests
    trigger: pull_request
    targets:
      - fedora-all-x86_64
      - fedora-all-aarch64
      - epel-8-x86_64
      - epel-8-aarch64
      - epel-9-x86_64
      - epel-9-aarch64
    identifier: system_test
    tmt_plan: "/plans/system_test"

  # System tests on RHEL
  - job: tests
    trigger: pull_request
    use_internal_tf: true
      #notifications:
      #failure_comment:
      #  message: "skopeo system tests failed on RHEL. @containers/packit-build please check."
    targets:
      epel-8-aarch64:
        distros: [RHEL-8.9.0-Nightly,RHEL-8.10.0-Nightly]
      epel-8-x86_64:
        distros: [RHEL-8.9.0-Nightly,RHEL-8.10.0-Nightly]
      epel-9-aarch64:
        distros: [RHEL-9.3.0-Nightly,RHEL-9.4.0-Nightly]
      epel-9-x86_64:
        distros: [RHEL-9.3.0-Nightly,RHEL-9.4.0-Nightly]
    identifier: system_test_internal
    tmt_plan: "/plans/system_test"

  - job: propose_downstream
    trigger: release
    update_release: false
    dist_git_branches:
      - fedora-all

  - job: koji_build
    trigger: commit
    dist_git_branches:
      - fedora-all

  - job: bodhi_update
    trigger: commit
    dist_git_branches:
      - fedora-branched # rawhide updates are created automatically
